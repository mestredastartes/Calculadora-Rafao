<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Nutrição — Rafael Schalins</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s:#111118;--s2:#1a1a24;--b:#2a2a3a;
  --ac:#e8ff47;--tx:#f0f0f8;--mu:#6b6b88;
  --gr:#3ddc84;--rd:#ff4757;--or:#ffa502;--bl:#47c8ff;--pu:#b847ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);padding:8px 12px;}
.hdr-row{display:flex;align-items:center;gap:8px;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--ac);flex-shrink:0;}
.pills{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{display:flex;flex-direction:column;align-items:center;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:4px 8px;flex-shrink:0;min-width:48px;}
.pv{font-family:'Bebas Neue',sans-serif;font-size:17px;line-height:1;color:var(--ac);}
.pl{font-size:8px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;}

/* ALERTA */
.ap{max-width:820px;margin:0 auto;padding:6px 12px 0;}
.ai{border-radius:10px;padding:10px 14px;display:none;}
.ai.issues{background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.25);}
.ai.ok{background:rgba(61,220,132,.06);border:1px solid rgba(61,220,132,.25);}
.at{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;margin-bottom:6px;}
.ag-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:4px;opacity:.7;}
.atags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.atag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid;display:flex;align-items:center;gap:4px;}
.atag.d{border-color:rgba(255,71,87,.5);color:var(--rd);background:rgba(255,71,87,.08);}
.atag.w{border-color:rgba(255,165,2,.5);color:var(--or);background:rgba(255,165,2,.08);}

/* MAIN */
.main{max-width:820px;margin:0 auto;padding:12px 12px 80px;}

/* SECTION */
.sec{margin-bottom:22px;}
.sec-hdr{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--ac);padding-bottom:8px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.sec-hdr:hover{opacity:.85;}
.chev{margin-left:auto;font-size:13px;color:var(--mu);transition:transform .25s;}
.collapsed .chev{transform:rotate(-90deg);}
.sec-body{overflow:hidden;transition:max-height .3s ease,opacity .25s;max-height:4000px;opacity:1;}
.collapsed .sec-body{max-height:0;opacity:0;pointer-events:none;}
.skcal{font-size:12px;color:var(--mu);margin-left:auto;font-family:'DM Sans',sans-serif;letter-spacing:0;}

/* INGREDIENTE */
.ilist{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
.irow{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:10px 12px;transition:border-color .15s;}
.irow:hover{border-color:rgba(232,255,71,.2);}
.itop{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.iname{font-size:13px;font-weight:600;flex:1;cursor:pointer;transition:color .15s;}
.iname:hover{color:var(--ac);}
.stepper{display:flex;align-items:center;background:var(--s2);border:1px solid var(--b);border-radius:8px;overflow:hidden;flex-shrink:0;}
.sbtn{width:36px;height:36px;background:none;border:none;color:var(--ac);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.sbtn:active{background:rgba(232,255,71,.15);}
.sdisp{display:flex;flex-direction:column;align-items:center;padding:0 8px;min-width:54px;}
.sval{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;color:var(--ac);cursor:text;border-radius:4px;padding:1px 4px;min-width:32px;text-align:center;display:inline-block;}
.sval:focus{outline:none;background:rgba(232,255,71,.15);border-bottom:2px solid var(--ac);}
.sunit{font-size:9px;color:var(--mu);letter-spacing:1px;}
.chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{display:flex;align-items:center;gap:4px;background:var(--s2);border-radius:6px;padding:3px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;}
.cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* SUPL / MED */
.srow{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--s);border:1px solid var(--b);border-radius:8px;margin-bottom:3px;cursor:pointer;transition:border-color .15s;}
.srow:hover{border-color:rgba(232,255,71,.2);}
.sname{font-size:13px;font-weight:500;flex:1;}
.sdose{font-size:11px;font-family:'JetBrains Mono',monospace;}

/* MICRO */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:540px){.mgrid{grid-template-columns:1fr;}}
.mgrp{background:var(--s);border:1px solid var(--b);border-radius:10px;overflow:hidden;}
.mgrp-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;padding:8px 12px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:6px;}
.mrow{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid rgba(42,42,58,.5);cursor:pointer;transition:background .1s;}
.mrow:hover{background:rgba(232,255,71,.03);}
.mrow:last-child{border-bottom:none;}
.mname{font-size:11px;color:var(--mu);flex:1;}
.mbar{width:60px;}
.mtrack{height:3px;background:var(--b);border-radius:2px;overflow:hidden;}
.mfill{height:100%;border-radius:2px;transition:width .4s;}
.mval{font-family:'JetBrains Mono',monospace;font-size:10px;width:52px;text-align:right;}
.mpct{font-size:10px;font-weight:600;width:36px;text-align:right;}

/* OBS */
.ocard{border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid;}
.otitle{font-size:13px;font-weight:600;margin-bottom:5px;}
.otext{font-size:12px;color:var(--mu);line-height:1.7;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{width:100%;max-height:88vh;background:var(--s);border-radius:16px 16px 0 0;border-top:1px solid var(--b);padding:16px;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease;}
.overlay.open .sheet{transform:translateY(0);}
.handle{width:40px;height:4px;background:var(--b);border-radius:2px;margin:0 auto 12px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--ac);margin-bottom:12px;}
.modal-body{font-size:13px;color:var(--mu);line-height:1.8;}
.modal-body strong{color:var(--tx);}
.modal-close{width:100%;margin-top:14px;padding:11px;background:var(--s2);border:1px solid var(--b);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--mu);cursor:pointer;}
.modal-close:hover{color:var(--tx);}
.warn-bar{padding:10px 14px;border-radius:8px;font-size:11px;margin-bottom:12px;background:rgba(255,165,2,.07);border:1px solid rgba(255,165,2,.3);color:#ffe5b3;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <span class="hdr-title">NUTRIÇÃO</span>
    <div class="pills">
      <div class="pill"><span class="pv" id="h-kcal">0</span><span class="pl">kcal</span></div>
      <div class="pill"><span class="pv" id="h-prot" style="color:var(--gr)">0g</span><span class="pl">prot</span></div>
      <div class="pill"><span class="pv" id="h-carbo" style="color:var(--bl)">0g</span><span class="pl">carbo</span></div>
      <div class="pill"><span class="pv" id="h-gord" style="color:var(--or)">0g</span><span class="pl">gord</span></div>
      <div class="pill"><span class="pv" id="h-fibra" style="color:var(--gr)">0g</span><span class="pl">fibras</span></div>
    </div>
  </div>
</div>

<div class="ap"><div class="ai" id="alert-panel">
  <div class="at" id="alert-title"></div>
  <div id="alert-body"></div>
</div></div>

<div class="main">

<div class="sec" id="s-r1">
  <div class="sec-hdr" onclick="tog('s-r1')">☕ REFEIÇÃO 1<span class="skcal" id="r1-sub">0 kcal</span><span class="chev">▼</span></div>
  <div class="sec-body"><div class="ilist" id="r1-list"></div></div>
</div>

<div class="sec" id="s-r2">
  <div class="sec-hdr" onclick="tog('s-r2')">🍲 REFEIÇÃO 2<span class="skcal" id="r2-sub">0 kcal</span><span class="chev">▼</span></div>
  <div class="sec-body"><div class="ilist" id="r2-list"></div></div>
</div>

<div class="sec" id="s-supl">
  <div class="sec-hdr" onclick="tog('s-supl')">💊 SUPLEMENTOS &amp; MEDICAÇÃO<span class="chev" style="margin-left:auto">▼</span></div>
  <div class="sec-body"><div id="supl-list" style="margin-top:6px"></div></div>
</div>

<div class="sec" id="s-obs">
  <div class="sec-hdr" onclick="tog('s-obs')">📋 OBSERVAÇÕES<span class="chev" style="margin-left:auto">▼</span></div>
  <div class="sec-body"><div id="obs-list" style="margin-top:8px"></div></div>
</div>

<div class="sec" id="s-micro">
  <div class="sec-hdr" onclick="tog('s-micro')">🧬 MICRONUTRIENTES<span class="chev" style="margin-left:auto">▼</span></div>
  <div class="sec-body">
    <div class="warn-bar" style="margin-top:8px">⚠️ Estimativas USDA FoodData Central. Variam conforme preparo e procedência.</div>
    <div class="mgrid" id="micro-grid"></div>
  </div>
</div>

</div>

<!-- MODAL -->
<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-close" onclick="closeModal()">Fechar</button>
  </div>
</div>

  vitB2:'<strong>Vitamina B2 (Riboflavina).</strong> IDR: 1,3mg. Precursor de FAD e FMN — coenzimas da cadeia transportadora de elétrons. Essencial para metabolismo de macronutrientes e ativação de B6 e folato. Leite em pó (1,5mg/100g) é a maior fonte nesta receita. Sensível à luz — armazenar embalagem protegida.',
  vitB3:'<strong>Vitamina B3 (Niacina).</strong> IDR: 16mg. Precursor de NAD⁺ e NADP⁺ — coenzimas de >400 reações enzimáticas. Crucial para reparo de DNA (PARP) e sinalização celular. Em altas doses (1–3g/dia) reduz triglicerídeos e aumenta HDL. Patinho (5,8mg/100g) é a maior fonte nesta receita.',
  vitB5:'<strong>Vitamina B5 (Ácido pantotênico).</strong> IDR: 5mg. Componente da coenzima A — essencial para síntese de ácidos graxos, acetilcolina, colesterol e metabolismo energético. Amplamente distribuída nos alimentos — deficiência isolada é extremamente rara. Patinho e batata-doce são as fontes principais nesta receita.',
  vitB6:'<strong>Vitamina B6 (Piridoxina).</strong> IDR: 1,3mg. Cofator de >100 reações enzimáticas. Essencial para síntese de neurotransmissores: serotonina (triptofano→5-HTP→serotonina), dopamina, GABA. Especialmente relevante com uso de Venvanse — o medicamento afeta vias dopaminérgicas que dependem de B6. Alho (1,24mg/100g) é fonte concentrada.',
  vitB7:'<strong>Vitamina B7 (Biotina).</strong> IDR: 30µg. Cofator de carboxilases — enzimas que adicionam CO₂ a substratos (piruvato carboxilase, acetil-CoA carboxilase). Essencial para síntese de ácidos graxos, gliconeogênese e metabolismo de aminoácidos. A avidina da clara de ovo crua inibe absorção de biotina — ovos cozidos eliminam esse problema. Amêndoas (61µg/100g) cobrem 204% IDR.',
  vitB9:'<strong>Vitamina B9 (Folato).</strong> IDR: 400µg. Essencial para síntese de DNA e divisão celular. Forma biologicamente ativa: 5-metilTHF. Doação de grupamentos metil no ciclo do folato (metilação do DNA e homocisteína). Déficit eleva homocisteína — fator de risco cardiovascular independente. Beterraba (109µg/100g) e feijão-branco (146µg/100g) são as maiores fontes nesta receita.',
  vitB12:'<strong>Vitamina B12 (Cobalamina).</strong> IDR: 2,4µg. Cofator de metionina sintase (ciclo do folato) e metilmalonil-CoA mutase (metabolismo de ácidos graxos). Essencial para mielinização neuronal. Deficiência: anemia megaloblástica, neuropatia periférica, demência. Patinho (2,4µg/100g = 100% IDR) é a fonte dominante. Absorção depende do fator intrínseco gástrico — monitorar em pacientes com gastrite atrófica.',
  colina:'<strong>Colina.</strong> IDR: 550mg. Essencial para síntese de fosfatidilcolina (membranas celulares), acetilcolina (neurotransmissão), e para exportação de VLDL pelo fígado (deficiência causa esteatose hepática). O ovo (294mg/100g) é a maior fonte: 4 ovos = 280mg. Relevante pois dietas sem ovos frequentemente apresentam deficiência de colina.',
  calcio:'<strong>Cálcio.</strong> IDR: 1.000mg. Mineralização óssea (99% do cálcio corporal está nos ossos), contração muscular, coagulação, sinalização celular. Absorção depende de D3 e K2. Leite em pó (1.257mg/100g) é a fonte dominante: 40g = 503mg (50% IDR). Atenção: excesso de sódio (sal) aumenta excreção urinária de cálcio.',
  fosforo:'<strong>Fósforo.</strong> IDR: 700mg. Componente de ATP (energia), DNA/RNA, fosfolipídios de membrana. Razão cálcio:fósforo ideal é 1:1 — excesso de fósforo (refrigerantes, alimentos processados) compete com cálcio. Esta receita tem excelente relação Ca:P com leite em pó e patinho como fontes principais.',
  magnesio:'<strong>Magnésio.</strong> IDR: 420mg. Cofator de >300 reações enzimáticas incluindo síntese de ATP, replicação de DNA, síntese proteica. Venvanse aumenta excreção urinária — suplementação é especialmente indicada. A calculadora soma 300mg (+) do Magnésio Tri Complex. Bisglicinato noturno melhora qualidade do sono e reduz rebote do estimulante.',
  potassio:'<strong>Potássio.</strong> IDR: 3.500mg. Principal cátion intracelular. Regula pressão arterial (antagonista do sódio), condução nervosa, contração muscular, balanço ácido-base. Beterraba (325mg/100g), espinafre (558mg/100g) e patinho (333mg/100g) são as fontes principais. Esta receita tem relação sódio:potássio desfavorável pelo sal — considerar redução.',
  sodio:'<strong>Sódio.</strong> IDR: 2.300mg (limite máximo). Principal cátion extracelular. 15g de sal/dia desta receita = ~5.800mg sódio — 2,5× acima da IDR. Monitorar pressão arterial. Reduzir para 7–8g/dia total (5g R1 + 2–3g R2) colocaria o sódio em ~3.000mg — mais próximo da meta. Potássio, magnésio e cálcio desta receita ajudam a atenuar o efeito hipertensivo.',
  ferro:'<strong>Ferro.</strong> IDR: 8mg. Componente da hemoglobina (transporte de O₂), mioglobina e citocromos da cadeia respiratória. Ferro heme do patinho tem biodisponibilidade 15–35% vs 2–20% do ferro não-heme vegetal. A vitamina C (brócolis, tomate) potencializa absorção do ferro não-heme. Café e chá inibem absorção — evitar 1h antes/após esta refeição.',
  zinco:'<strong>Zinco.</strong> IDR: 11mg. Cofator de >300 enzimas. Essencial para síntese de DNA, divisão celular, cicatrização, imunidade e função gonadal. Patinho (4,5mg/100g) e amêndoas (3,1mg/100g) são as principais fontes. Biodisponibilidade do zinco animal é 3–4× superior ao vegetal. Fitatos de feijão e cereais reduzem absorção do zinco vegetal.',
  cobre:'<strong>Cobre.</strong> IDR: 0,9mg. Cofator de ceruloplasmina, citocromo c oxidase, superóxido dismutase Cu-Zn. Essencial para metabolismo do ferro, síntese de colágeno e mielinização. Antagonismo com zinco em altas doses — excesso de suplementação de zinco pode causar deficiência de cobre. Esta receita cobre ~89% da IDR — lacuna leve aceitável.',
  manganes:'<strong>Manganês.</strong> IDR: 2,3mg. Cofator de arginase, piruvato carboxilase e superóxido dismutase Mn (mitocôndrial). Essencial para síntese de glicosaminoglicanas (cartilagem) e uréia. Amêndoas (2,5mg/100g) e espinafre (0,9mg/100g) são fontes principais. Esta receita tem lacuna leve (~74% IDR) — aceitável.',
  selenio:'<strong>Selênio.</strong> IDR: 55µg. Cofator de glutationa peroxidase (GPx — antioxidante central), tiorredoxina redutase e iodotironina deiodinase (ativação do T3 tireoidiano). A castanha-do-pará (1.917µg/100g!) cobre toda a necessidade com 5g. Limite superior tolerável: 400µg/dia. Monitorar cuidadosamente a dose da castanha.',
  iodo:'<strong>Iodo.</strong> IDR: 150µg. Essencial para síntese dos hormônios tireóideos T3 e T4. Total desta receita (sal iodado R1+R2 + leite em pó): ~830µg — acima da IDR mas dentro do limite seguro (1.100µg/dia OMS). A calculadora soma o iodo do sal automaticamente. Deficiência causa hipotireoidismo, bócio e déficit cognitivo — por isso NÃO substituir o sal iodado.',
  cromo:'<strong>Cromo.</strong> IDR: 35µg. Potencia ação da insulina através do fator de tolerância à glicose (FTG). Melhora captação de glicose celular. Deficiência associada a resistência insulínica. Esta receita cobre a IDR principalmente via leite em pó e amêndoas. Biodisponibilidade do cromo alimentar é baixa (0,4–2,5%).',
  molibdenio:'<strong>Molibdênio.</strong> IDR: 45µg. Cofator de xantina oxidase (metabolismo de purinas → ácido úrico), sulfito oxidase (detoxificação de sulfitos) e aldeído oxidase. Feijão-branco é a maior fonte (100µg/100g = 222% IDR). Deficiência isolada é extremamente rara. Excesso interfere no metabolismo do cobre.',
  omega3:'<strong>Ômega-3 (EPA+DHA).</strong> IDR: 1,6g ALA. EPA e DHA são as formas biologicamente ativas. A calculadora soma 2g (+) do suplemento Ômega-3 TG. EPA: anti-inflamatório (compete com ácido araquidônico). DHA: componente estrutural do cérebro (60% dos ácidos graxos cerebrais). Meta para saúde cardiovascular e cerebral: 2g EPA+DHA/dia. Exame de índice ômega-3 agendado 04/05/2026.',
  omega6:'<strong>Ômega-6 (Linoleico/Araquidônico).</strong> IDR: 17g. Pró-inflamatório em excesso — razão ω-6:ω-3 moderna (~15:1) é muito superior à evolutiva (~4:1). Esta receita com azeite (em vez de óleo de girassol) e ômega-3 suplementado resulta em razão ~4:1 — próxima ao ideal. Amêndoas contribuem com ω-6 mas têm perfil lipídico geral favorável.',
};

// ── SUPL_MICROS ───────────────────────────────────────────────────────────
const SUPL_MICROS={magnesio:300,vitD:175,vitK2:150,omega3:2};

// ── LOCALSTORAGE ──────────────────────────────────────────────────────────
const LS='nutri_r2v1';
let g1={},g2={};
R1.forEach(i=>g1[i.id]=i.grams);
R2.forEach(i=>g2[i.id]=i.grams);
(()=>{try{const d=JSON.parse(localStorage.getItem(LS)||'null');if(!d)return;if(d.r1)Object.keys(g1).forEach(k=>{if(d.r1[k]!==undefined)g1[k]=d.r1[k];});if(d.r2)Object.keys(g2).forEach(k=>{if(d.r2[k]!==undefined)g2[k]=d.r2[k];});}catch(e){}})();
function saveLS(){try{localStorage.setItem(LS,JSON.stringify({r1:g1,r2:g2}));}catch(e){}}

// ── UTILS ─────────────────────────────────────────────────────────────────
const fmt=n=>Math.round(n*10)/10;

function calcSec(list,gramsObj){
  let kcal=0,prot=0,carbo=0,gord=0,fibra=0;
  list.forEach(({id})=>{const d=DB[id],f=(gramsObj[id]||0)/100;kcal+=d.kcal*f;prot+=d.prot*f;carbo+=d.carbo*f;gord+=d.gord*f;fibra+=d.fibra*f;});
  return{kcal,prot,carbo,gord,fibra};
}
function calcMicros(){
  const t={};Object.keys(IDR).forEach(k=>t[k]=0);
  [[R1,g1],[R2,g2]].forEach(([list,grams])=>{
    list.forEach(({id})=>{const d=DB[id],f=(grams[id]||0)/100;Object.keys(IDR).forEach(k=>{if(d[k]!==undefined)t[k]+=d[k]*f;});});
  });
  Object.entries(SUPL_MICROS).forEach(([k,v])=>{t[k]=(t[k]||0)+v;});
  return t;
}

// ── RENDER INGREDIENTE ────────────────────────────────────────────────────
function mkRow(item,gramsObj){
  const d=DB[item.id];let g=gramsObj[item.id]||0;
  const wrap=document.createElement('div');wrap.className='irow';
  function chips(g){
    const f=g/100;
    return `<div class=chips>
      <div class=chip><div class=cdot style="background:var(--ac)"></div><span style="color:var(--ac)">${fmt(d.kcal*f)}</span><span class=chip style="background:none;color:var(--mu);font-size:9px">kcal</span></div>
      <div class=chip><div class=cdot style="background:var(--gr)"></div><span style="color:var(--gr)">${fmt(d.prot*f)}g</span><span style="color:var(--mu);font-size:9px">prot</span></div>
      <div class=chip><div class=cdot style="background:var(--bl)"></div><span style="color:var(--bl)">${fmt(d.carbo*f)}g</span><span style="color:var(--mu);font-size:9px">carbo</span></div>
      <div class=chip><div class=cdot style="background:var(--or)"></div><span style="color:var(--or)">${fmt(d.gord*f)}g</span><span style="color:var(--mu);font-size:9px">gord</span></div>
    </div>`;
  }
  wrap.innerHTML=`
    <div class=itop>
      <div class=iname>${d.name}</div>
      <div class=stepper>
        <button class=sbtn type=button>−</button>
        <div class=sdisp><span class=sval contenteditable=true inputmode=numeric>${g}</span><span class=sunit>${d.unit}</span></div>
        <button class=sbtn type=button>+</button>
      </div>
    </div>${chips(g)}`;

  wrap.querySelector('.iname').addEventListener('click',()=>openModal(d.name,d.info));

  function upd(newG){
    g=Math.max(0,Math.round(newG));gramsObj[item.id]=g;
    const sv=wrap.querySelector('.sval');
    if(document.activeElement!==sv)sv.textContent=g;
    wrap.querySelector('.chips').outerHTML=chips(g);
    // rebuild chips
    const newChips=wrap.querySelector('.itop').nextElementSibling;
    updateAll();saveLS();
  }
  // rebuild approach: replace innerHTML of chips div
  function updClean(newG){
    g=Math.max(0,Math.round(newG));gramsObj[item.id]=g;
    const sv=wrap.querySelector('.sval');
    if(document.activeElement!==sv)sv.textContent=g;
    const chipsEl=wrap.querySelectorAll('.chips')[0];
    if(chipsEl)chipsEl.outerHTML=chips(g);
    updateAll();saveLS();
  }

  const [btnM,btnP]=wrap.querySelectorAll('.sbtn');
  btnM.addEventListener('click',()=>updClean(g-5));
  btnP.addEventListener('click',()=>updClean(g+5));

  let hold;
  [[btnM,-5],[btnP,5]].forEach(([btn,d])=>{
    btn.addEventListener('pointerdown',()=>{hold=setInterval(()=>updClean(g+d),150);});
    ['pointerup','pointerleave','pointercancel'].forEach(ev=>btn.addEventListener(ev,()=>clearInterval(hold)));
  });

  const sv=wrap.querySelector('.sval');
  sv.addEventListener('focus',()=>{const r=document.createRange(),s=window.getSelection();r.selectNodeContents(sv);s.removeAllRanges();s.addRange(r);});
  sv.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();sv.blur();}
    if(e.key==='Escape'){sv.textContent=g;sv.blur();}
    if(!/[0-9]/.test(e.key)&&!['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Enter','Escape'].includes(e.key))e.preventDefault();
  });
  sv.addEventListener('blur',()=>updClean(parseInt(sv.textContent)||0));
  return wrap;
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(title,body){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

// ── UPDATE ALL ────────────────────────────────────────────────────────────
function updateAll(){
  const r1=calcSec(R1,g1),r2=calcSec(R2,g2);
  const T={kcal:r1.kcal+r2.kcal,prot:r1.prot+r2.prot,carbo:r1.carbo+r2.carbo,gord:r1.gord+r2.gord,fibra:r1.fibra+r2.fibra};
  const kc=T.kcal>2100?'var(--rd)':T.kcal>1950?'var(--or)':'var(--ac)';
  document.getElementById('h-kcal').textContent=Math.round(T.kcal);document.getElementById('h-kcal').style.color=kc;
  document.getElementById('h-prot').textContent=Math.round(T.prot)+'g';document.getElementById('h-prot').style.color=T.prot>=150?'var(--gr)':'var(--or)';
  document.getElementById('h-carbo').textContent=Math.round(T.carbo)+'g';
  document.getElementById('h-gord').textContent=Math.round(T.gord)+'g';
  const fc=T.fibra>=38?'var(--gr)':T.fibra>=25?'var(--or)':'var(--rd)';
  document.getElementById('h-fibra').textContent=Math.round(T.fibra)+'g';document.getElementById('h-fibra').style.color=fc;
  document.getElementById('r1-sub').textContent=Math.round(r1.kcal)+' kcal';
  document.getElementById('r2-sub').textContent=Math.round(r2.kcal)+' kcal';
  const m=calcMicros();renderMicros(m);renderAlerts(m);
}

// ── MICROS ────────────────────────────────────────────────────────────────
const SKEYS={vitD:1,magnesio:1,vitK2:1,omega3:1};
function renderMicros(t){
  const g=document.getElementById('micro-grid');g.innerHTML='';
  MGROUPS.forEach(grp=>{
    const box=document.createElement('div');box.className='mgrp';
    box.innerHTML=`<div class=mgrp-title style="color:${grp.color}">● ${grp.title}</div>`;
    grp.keys.forEach(k=>{
      const val=t[k]||0,idr=IDR[k],pct=(val/idr)*100,pC=Math.min(pct,100);
      const c=pct>=100?'var(--gr)':pct>=70?'var(--or)':'var(--rd)';
      const lbl=`${fmt(val)} ${MUNITS[k]}${SKEYS[k]?' (+)':''}`;
      const row=document.createElement('div');row.className='mrow';
      row.innerHTML=`<span class=mname>${MLABELS[k]}</span><div class=mbar><div class=mtrack><div class=mfill style="width:${pC}%;background:${c}"></div></div></div><span class=mval style="color:var(--mu)">${lbl}</span><span class=mpct style="color:${c}">${Math.min(999,Math.round(pct))}%</span>`;
      row.addEventListener('click',()=>openModal(MLABELS[k],MINFO[k]||'Informação não disponível.'));
      box.appendChild(row);
    });
    g.appendChild(box);
  });
}

// ── ALERTAS ───────────────────────────────────────────────────────────────
function renderAlerts(t){
  const panel=document.getElementById('alert-panel'),titleEl=document.getElementById('alert-title'),bodyEl=document.getElementById('alert-body');
  bodyEl.innerHTML='';panel.classList.remove('issues','ok');
  const gi={};MGROUPS.forEach(g=>gi[g.title]=[]);
  let tot=0;
  MGROUPS.forEach(grp=>grp.keys.forEach(k=>{
    const pct=(t[k]||0)/IDR[k]*100;
    if(pct<70){gi[grp.title].push({k,pct,lvl:pct<50?'d':'w'});tot++;}
  }));
  panel.style.display='block';
  if(!tot){panel.classList.add('ok');titleEl.style.color='var(--gr)';titleEl.textContent='✓ TODOS OS MICRONUTRIENTES DENTRO DO RECOMENDADO';return;}
  panel.classList.add('issues');titleEl.style.color='var(--rd)';titleEl.textContent='⚠ MICRONUTRIENTES ABAIXO DO RECOMENDADO';
  MGROUPS.forEach(grp=>{
    const issues=gi[grp.title];if(!issues.length)return;
    const d=document.createElement('div');
    d.innerHTML=`<div class=ag-title style="color:${grp.color}">${grp.title}</div>`;
    const tags=document.createElement('div');tags.className='atags';
    issues.sort((a,b)=>a.pct-b.pct).forEach(({k,pct,lvl})=>{
      const tag=document.createElement('div');tag.className='atag '+lvl;
      tag.textContent=(lvl==='d'?'✕ ':'! ')+MLABELS[k]+' · '+Math.round(pct)+'%';
      tags.appendChild(tag);
    });
    d.appendChild(tags);bodyEl.appendChild(d);
  });
}

// ── COLLAPSIBLE ───────────────────────────────────────────────────────────
function tog(id){document.getElementById(id).classList.toggle('collapsed');}

// ── OBSERVAÇÕES ───────────────────────────────────────────────────────────
const OBS=[
  {icon:'🧂',lv:'info',title:'SAL IODADO — Não substituir',text:'R1 (5g) + R2 (10g) = ~600µg iodo/dia — dentro do limite seguro (1.100µg/dia OMS). NÃO usar sal rosa do Himalaia, sal marinho ou fleur de sel. Sódio total: ~5.800mg — acima da IDR. Monitorar PA regularmente.'},
  {icon:'☀️',lv:'urgente',title:'VITAMINA D3 — Exame urgente',text:'Base: 11,5 ng/mL (out/2025). Suplementando 7.000 UI/dia há +5 meses. Refazer 25(OH)D imediatamente. Meta: 40–60 ng/mL.'},
  {icon:'🦴',lv:'alerta',title:'K2-MK7 — Verificar rótulo',text:'Usar SOMENTE All-Trans MK-7. Marcas: Bigens (M.Labs) ou Lauton Clinical. Forma cis é inativa. Co-obrigatória com D3.'},
  {icon:'🐟',lv:'info',title:'ÔMEGA-3 — Exame 04/05/2026',text:'Índice ômega-3 nas hemácias. Meta >8%. Forma TG tem 30% mais absorção que éster etílico. IFOS 5 estrelas.'},
  {icon:'🧠',lv:'info',title:'CREATINA — 10g/dia',text:'Atravessa barreira hematoencefálica acima de 5g/dia. Benefício cognitivo documentado especialmente com privação de sono.'},
  {icon:'💊',lv:'info',title:'MAGNÉSIO — Manhã e noite',text:'1 cap manhã (dimalato — energia) + 1 cap noite (bisglicinato — sono, reduz rebote do Venvanse). Não tomar ambas juntas.'},
  {icon:'🌰',lv:'alerta',title:'CASTANHA — Máximo 1/dia',text:'5g = ~96µg selênio (175% IDR). Excesso: selenose (queda de cabelo, toxicidade neurológica). Não aumentar a dose.'},
  {icon:'🔬',lv:'info',title:'CROMO — Suplementação não necessária',text:'A dieta fornece ~11µg calculados (32% IDR), mas os dados de cromo nas tabelas USDA são amplamente incompletos — a maioria dos vegetais e carnes tem cromo não mensurado. Estudos de dieta total estimam 25–40µg/dia em alimentação equilibrada como esta. Fontes desta dieta: patinho 400g (~8µg), amêndoas 20g (~1,2µg), leite em pó 40g (~1,2µg), ovos 200g (~0,8µg). Suplementação de cromo picolinato não tem evidência robusta em indivíduos saudáveis sem resistência insulínica documentada — meta-análises mostram efeito mínimo fora do contexto de DM2. Não suplementar.'},
];

function renderObs(){
  const list=document.getElementById('obs-list');
  const cols={urgente:{bg:'rgba(255,71,87,.07)',bd:'rgba(255,71,87,.3)',c:'var(--rd)'},alerta:{bg:'rgba(255,165,2,.07)',bd:'rgba(255,165,2,.3)',c:'var(--or)'},info:{bg:'rgba(71,200,255,.05)',bd:'rgba(71,200,255,.2)',c:'var(--bl)'}};
  OBS.forEach(o=>{
    const cl=cols[o.lv];
    const d=document.createElement('div');d.className='ocard';
    d.style.cssText=`background:${cl.bg};border-color:${cl.bd};`;
    d.innerHTML=`<div class=otitle style="color:${cl.c}">${o.icon} ${o.title}</div><div class=otext>${o.text}</div>`;
    list.appendChild(d);
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────
(()=>{
  const l1=document.getElementById('r1-list');R1.forEach(i=>l1.appendChild(mkRow(i,g1)));
  const l2=document.getElementById('r2-list');R2.forEach(i=>l2.appendChild(mkRow(i,g2)));
  const sl=document.getElementById('supl-list');
  SUPLS.forEach(s=>{
    const r=document.createElement('div');r.className='srow';
    r.innerHTML=`<div class=sname>${s.name}</div><div class=sdose style="color:${s.color}">${s.dose}</div>`;
    r.addEventListener('click',()=>openModal(s.name,s.info));
    sl.appendChild(r);
  });
  renderObs();updateAll();
})();
</script>
